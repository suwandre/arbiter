services:
  arbiter:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
